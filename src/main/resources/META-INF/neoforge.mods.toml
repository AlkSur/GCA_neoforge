modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "MIT"
issueTrackerURL = "${mod_issues}"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
displayURL = "${mod_homepage}"
authors = "AlkSur"
credits = "Original author: Gugle, ported to NeoForge by AlkSur"
description = "GugleCarpetAddition for NeoForge. Ported from Fabric to NeoForge. Original author: Gugle, NeoForge port by AlkSur."
logoFile = "gca_neoforge.png"

[[mixins]]
config = "mixins/gca_neoforge.mixins.json"

[[accessTransformers]]
file = "META-INF/accesstransformer.cfg"

[[dependencies.${mod_id}]]
    modId = "neoforge"
    type = "required"
    versionRange = "${neo_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "carpet"
    type = "required"
    versionRange = "[1.4.147,)"
    ordering = "AFTER"
    side = "BOTH"
